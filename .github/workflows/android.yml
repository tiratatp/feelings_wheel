name: Android CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run ktlintCheck
        run: ./gradlew ktlintCheck

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Run tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Build release APK and AAB
        if: startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          ./gradlew assembleRelease bundleRelease

      - name: Rename release artifacts
        if: startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/feelingswheel-${VERSION}-release.apk"
          mv app/build/outputs/bundle/release/app-release.aab "app/build/outputs/bundle/release/feelingswheel-${VERSION}-release.aab"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE_BASE64 != ''
        uses: softprops/action-gh-release@v2
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/feelingswheel-*-release.apk
            app/build/outputs/bundle/release/feelingswheel-*-release.aab

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check for Play Store credentials
        id: check-creds
        run: |
          if [ -z "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check-creds.outputs.has_creds == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        if: steps.check-creds.outputs.has_creds == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        if: steps.check-creds.outputs.has_creds == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: steps.check-creds.outputs.has_creds == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release.jks

      - name: Publish to Play Store
        if: steps.check-creds.outputs.has_creds == 'true'
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: ./gradlew publishReleaseBundle
